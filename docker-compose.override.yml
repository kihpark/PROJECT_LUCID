# DEVX-01 — development overrides (auto-loaded by `docker compose up`).
#
# This file is GIT-TRACKED on purpose: every developer gets the same
# inner loop. To run the production shape instead, point compose at
# the base file explicitly:
#
#     docker compose -f docker-compose.yml up --build
#
# Postgres and Elasticsearch are NOT redeclared here — their stateful
# volumes (`postgres_data`, `es_data`) and healthchecks are tuned in
# the base compose and should not be touched by dev tooling.
#
# 2026-06-22 (feat/infra-agent-isolation): the backend dev override
# (host bind-mount + `--reload`) is REMOVED. The 2026-06-22 incident
# showed that any process writing to the host `backend/` directory
# could leak into the live backend container — including agent
# verification copying worktree files into SHARED. Backend now runs
# the image as-built. Code changes require:
#
#     docker compose up -d --build backend
#
# (10–20s rebuild; hot-reload is intentionally gone for the backend.)
# Agents verify in an ephemeral container — see AGENTS.md §15.
#
# The `web` override (Next HMR + bind-mount) is unchanged because the
# frontend dev loop has no equivalent attack surface: the web service
# does not execute code that mutates persistent backend state.
#
# Rebuild grades (see HANDOFF.md):
#   CODE (backend)     → `docker compose up -d --build backend`.
#   CODE (frontend)    → bind-mount picks it up; no rebuild.
#   DEPS (compose / requirements.txt / package.json)
#                      → `docker compose up -d --build` once.
#   MAPPING (ES strict)
#                      → wipe + reindex_all + replay.
services:

  web:
    # Next.js HMR. The override mounts the source tree but uses an
    # anonymous volume to mask the host's node_modules and .next —
    # both are platform-specific (Windows pnpm symlinks ≠ Linux
    # container layout) and would otherwise overlay the
    # cleanly-installed Linux node_modules from the image.
    environment:
      NODE_ENV: development
      # Disable the Next.js telemetry banner so the HMR logs are clean.
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./frontend/web:/app
      - /app/node_modules
      - /app/.next
    command: pnpm dev --hostname 0.0.0.0 --port 3000
