# Lucid - local development stack (v2).
#
# Beta runs on Postgres + Elasticsearch (with nori plugin for Korean).
# Neo4j and FAISS were retired in Sprint 1A PR-1A-1 (see CONFLICTS.md C-14
# and the PO directives that landed on 2026-05-21).
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lucid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lucid}
      POSTGRES_DB: ${POSTGRES_DB:-lucid}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-lucid} -d $${POSTGRES_DB:-lucid}"]
      interval: 5s
      timeout: 3s
      retries: 12

  elasticsearch:
    build:
      context: ./docker/elasticsearch
      dockerfile: Dockerfile
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-changeme}
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -E 'yellow|green' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  # DEVX-01: this is the PRODUCTION shape — the image built from
  # backend/Dockerfile runs as-is (no source mount, no --reload).
  # `docker-compose.override.yml` (auto-loaded when present) adds the
  # bind mount + --reload for the dev inner loop. To force production
  # mode, run `docker compose -f docker-compose.yml up` (skips the
  # override) or delete the override file.
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-lucid}:${POSTGRES_PASSWORD:-lucid}@postgres:5432/${POSTGRES_DB:-lucid}"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  # DEVX-01: production Next.js (`pnpm start`, NODE_ENV=production).
  # The dev override swaps `pnpm dev` + bind mount for HMR.
  web:
    build: ./frontend/web
    ports:
      - "3000:3000"
    environment:
      # NEXT_PUBLIC_* is inlined at build time and reaches the browser,
      # which talks to the host-mapped backend port (8000:8000).
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      # INTERNAL_API_URL is server-side only — Next SSR runs inside
      # the web container, where the docker DNS name `backend` resolves
      # to the backend container. Using `localhost` here would loop
      # back to the web container itself (ECONNREFUSED).
      INTERNAL_API_URL: "http://backend:8000"
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  postgres_data:
  es_data:
